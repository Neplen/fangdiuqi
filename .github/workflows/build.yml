name: Android CI - Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 验证项目结构
      run: |
        echo "=== 验证 Android 项目结构 ==="
        echo "检查文件存在性..."
        test -f "settings.gradle.kts" && echo "✅ settings.gradle.kts 存在" || echo "❌ settings.gradle.kts 缺失"
        test -f "build.gradle.kts" && echo "✅ build.gradle.kts 存在" || echo "❌ build.gradle.kts 缺失"
        test -f "app/build.gradle.kts" && echo "✅ app/build.gradle.kts 存在" || echo "❌ app/build.gradle.kts 缺失"
        test -f "gradlew" && echo "✅ gradlew 存在" || echo "❌ gradlew 缺失"
        test -f "gradle/wrapper/gradle-wrapper.jar" && echo "✅ gradle-wrapper.jar 存在" || echo "❌ gradle-wrapper.jar 缺失"
        
        echo "检查 Gradle Wrapper..."
        chmod +x gradlew
        ./gradlew --version

    - name: 设置 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: 启用 Gradle 缓存
      uses: gradle/actions/setup-gradle@v3
      with:
        cache-enabled: true

    - name: 清理构建
      run: ./gradlew clean --no-daemon

    - name: 编译 Debug APK
      run: |
        echo "开始编译 Debug APK..."
        ./gradlew assembleDebug --stacktrace --info --no-daemon 2>&1 | tee build.log
        
    - name: 验证 APK 生成
      run: |
        echo "检查生成的 APK..."
        if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          echo "✅ APK 生成成功"
          ls -lh app/build/outputs/apk/debug/
        else
          echo "❌ APK 生成失败"
          exit 1
        fi

    - name: 上传 Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: BleLostFinder-Debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: 编译 Release APK（可选）
      run: ./gradlew assembleRelease --stacktrace --no-daemon || echo "Release 编译失败，但 Debug 版本已可用"
      continue-on-error: true

    - name: 上传 Release APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: BleLostFinder-Release-Unsigned
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30
        if-no-files-found: ignore

    - name: 生成编译报告
      if: always()
      run: |
        echo "## 编译报告" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**编译时间**: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
        echo "**提交**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "**分支**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          echo "### ✅ 编译成功" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**APK 信息**：" >> $GITHUB_STEP_SUMMARY
          echo "- 文件名：app-debug.apk" >> $GITHUB_STEP_SUMMARY
          echo "- 文件大小：$(du -h app/build/outputs/apk/debug/app-debug.apk | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**下载方式**：" >> $GITHUB_STEP_SUMMARY
          echo "1. 滚动到页面底部 **Artifacts** 区域" >> $GITHUB_STEP_SUMMARY
          echo "2. 点击 **BleLostFinder-Debug**" >> $GITHUB_STEP_SUMMARY
          echo "3. 下载并解压得到 APK" >> $GITHUB_STEP_SUMMARY
        else
          echo "### ❌ 编译失败" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "请查看上面的日志获取详细信息" >> $GITHUB_STEP_SUMMARY
        fi
